<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants | BiteDash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">
                Bite<span>Dash</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="restaurants.html" class="active">Restaurants</a></li>
                <li><a href="cart.html" class="cart-icon-container">Cart <span id="cart-badge-count" class="cart-badge" style="display:none;">0</span></a></li>
                <li><a href="orders.html">My Orders</a></li>
                <li><a href="dashboard.html">Admin Panel</a></li>
            </ul>
            <div class="nav-right" id="nav-auth-section">
                <!-- Dynamically populated by JS -->
            </div>
        </nav>
    </header>

    <main>
        <div class="section-header">
            <h2>Explore Restaurants</h2>
            <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                <select id="cuisine-filter" class="btn btn-secondary btn-sm" style="border: 1px solid var(--border); background: white;">
                    <option value="">All Cuisines</option>
                    <option value="South Indian">South Indian</option>
                    <option value="North Indian">North Indian</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Italian">Italian</option>
                    <option value="Fast Food">Fast Food</option>
                </select>
                <input type="text" id="restaurant-search" placeholder="Search by name or location..." class="btn btn-secondary btn-sm" style="border: 1px solid var(--border); background: white; text-align: left; width: 250px;">
            </div>
        </div>

        <div class="grid-cols-3" id="restaurants-list-container">
            <!-- Dynamically populated by JS -->
        </div>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initRestaurantsPage();
        });
    </script>
</body>
</html>
