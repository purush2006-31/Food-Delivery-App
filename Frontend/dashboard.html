<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | BiteDash</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const cust = localStorage.getItem('current_customer');
            if (!cust) {
                window.location.href = 'login.html';
            } else {
                const user = JSON.parse(cust);
                if (user.role !== 'admin') {
                    window.location.href = 'index.html';
                }
            }
        })();
    </script>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">
                Bite<span>Dash</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="restaurants.html">Restaurants</a></li>
                <li><a href="cart.html" class="cart-icon-container">Cart <span id="cart-badge-count" class="cart-badge" style="display:none;">0</span></a></li>
                <li><a href="orders.html">My Orders</a></li>
                <li><a href="dashboard.html" class="active">Admin Panel</a></li>
            </ul>
            <div class="nav-right" id="nav-auth-section">
                <!-- Dynamically populated by JS -->
            </div>
        </nav>
    </header>

    <main style="max-width: 1300px;">
        <div class="dashboard-layout">
            <!-- Sidebar Navigation -->
            <aside class="dashboard-sidebar">
                <h4 style="margin-bottom: 1rem; color: var(--secondary); font-weight: 600; font-size: 0.95rem; padding-left: 1rem;">NAVIGATION</h4>
                <button class="tab-btn active" id="tab-customers">👥 Customers</button>
                <button class="tab-btn" id="tab-restaurants">🏢 Restaurants</button>
                <button class="tab-btn" id="tab-foods">🍕 Food Menu</button>
                <button class="tab-btn" id="tab-orders">📦 Orders</button>
            </aside>

            <!-- Table Content Area -->
            <section class="dashboard-content">
                <div class="dashboard-table-header">
                    <h3 id="dashboard-section-title">Manage Customers</h3>
                    <button class="btn btn-primary btn-sm" id="dashboard-add-btn">+ Add Record</button>
                </div>

                <div class="table-container">
                    <table id="dashboard-table">
                        <thead id="dashboard-table-thead">
                            <!-- Populated dynamically by JS -->
                        </thead>
                        <tbody id="dashboard-table-tbody">
                            <!-- Populated dynamically by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal Form (Hidden by default) -->
    <div class="modal-overlay" id="admin-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modal-title">Add Record</h3>
                <button class="modal-close-btn" id="modal-close-x">&times;</button>
            </div>
            <form id="modal-form">
                <div class="modal-body" id="modal-fields-container">
                    <!-- Populated dynamically by JS -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="modal-save-btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initDashboardPage();
        });
    </script>
</body>
</html>
