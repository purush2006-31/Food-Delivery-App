<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BiteDash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">
                Bite<span>Dash</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="restaurants.html">Restaurants</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="orders.html">My Orders</a></li>
                <li><a href="dashboard.html">Admin Panel</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-header">
                <h2 id="login-title-text">Customer Login</h2>
                <p id="login-desc-text">Login to your customer profile to place food orders.</p>
            </div>

            <!-- Login Role Selector Toggle -->
            <div style="display: flex; margin-bottom: 1.5rem; background: var(--border); border-radius: var(--radius-md); padding: 0.25rem;">
                <button type="button" id="toggle-customer" class="tab-btn active" style="flex: 1; text-align: center; border-radius: var(--radius-sm); font-size: 0.9rem; padding: 0.5rem;">👤 Customer</button>
                <button type="button" id="toggle-admin" class="tab-btn" style="flex: 1; text-align: center; border-radius: var(--radius-sm); font-size: 0.9rem; padding: 0.5rem;">🔑 Admin</button>
            </div>

            <form id="login-form">
                <!-- Customer Fields -->
                <div class="form-group" id="group-customer-name">
                    <label for="login-name">Full Name</label>
                    <input type="text" id="login-name" placeholder="e.g. Rahul Sharma">
                </div>
                <div class="form-group" id="group-customer-email">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="e.g. rahul@gmail.com">
                </div>

                <!-- Admin Fields (Hidden by default) -->
                <div class="form-group" id="group-admin-username" style="display: none;">
                    <label for="login-username">Admin Username</label>
                    <input type="text" id="login-username" placeholder="e.g. admin">
                </div>
                <div class="form-group" id="group-admin-password" style="display: none;">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter admin password">
                </div>

                <button type="submit" class="btn btn-primary form-submit-btn">Login</button>
            </form>
            <div class="auth-footer" id="register-footer-text">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initLoginPage();
        });
    </script>
</body>
</html>
