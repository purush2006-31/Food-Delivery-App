<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteDash | Delicious Food Delivered Fast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">
                Bite<span>Dash</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="restaurants.html">Restaurants</a></li>
                <li><a href="cart.html" class="cart-icon-container">Cart <span id="cart-badge-count" class="cart-badge" style="display:none;">0</span></a></li>
                <li><a href="orders.html">My Orders</a></li>
                <li><a href="dashboard.html">Admin Panel</a></li>
            </ul>
            <div class="nav-right" id="nav-auth-section">
                <!-- Will be dynamically populated by JS -->
                <a href="login.html" class="btn btn-secondary btn-sm">Login</a>
                <a href="register.html" class="btn btn-primary btn-sm">Register</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Craving something delicious?</h1>
            <p>Order from your favorite restaurants and get hot food delivered straight to your door.</p>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search restaurants or food items...">
                <button class="btn btn-primary" id="search-btn">Search</button>
            </div>
        </section>

        <section class="featured-section">
            <div class="section-header">
                <h2>Featured Food Items</h2>
            </div>
            <div class="grid-cols-3" id="featured-foods-list">
                <!-- Dynamically populated by JS -->
            </div>
        </section>

        <section class="restaurants-section">
            <div class="section-header">
                <h2>Popular Restaurants</h2>
                <a href="restaurants.html" class="btn btn-secondary btn-sm">View All</a>
            </div>
            <div class="grid-cols-3" id="popular-restaurants-list">
                <!-- Dynamically populated by JS -->
            </div>
        </section>
    </main>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initHomePage();
        });
    </script>
</body>
</html>
