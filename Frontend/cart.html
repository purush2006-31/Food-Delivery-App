<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | BiteDash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">
                Bite<span>Dash</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="restaurants.html">Restaurants</a></li>
                <li><a href="cart.html" class="active cart-icon-container">Cart <span id="cart-badge-count" class="cart-badge" style="display:none;">0</span></a></li>
                <li><a href="orders.html">My Orders</a></li>
                <li><a href="dashboard.html">Admin Panel</a></li>
            </ul>
            <div class="nav-right" id="nav-auth-section">
                <!-- Dynamically populated by JS -->
            </div>
        </nav>
    </header>

    <main>
        <div class="section-header">
            <h2>Your Shopping Cart</h2>
        </div>

        <div class="cart-layout" id="cart-layout-container">
            <!-- Left: Cart Items -->
            <div class="cart-items-container" id="cart-items-list">
                <!-- Dynamically populated by JS -->
                <p style="text-align: center; color: var(--text-secondary); padding: 2rem;">Loading cart items...</p>
            </div>

            <!-- Right: Order Summary -->
            <div class="cart-summary">
                <h3 style="margin-bottom: 1.5rem; color: var(--secondary); font-weight: 600;">Bill Details</h3>
                <div class="summary-row">
                    <span>Items Subtotal</span>
                    <span id="subtotal-amount">₹0.00</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Partner Fee</span>
                    <span id="delivery-amount">₹40.00</span>
                </div>
                <div class="summary-row">
                    <span>Govt Taxes & Charges</span>
                    <span id="tax-amount">₹15.00</span>
                </div>
                <div class="summary-total">
                    <span>Grand Total</span>
                    <span id="grand-total-amount">₹0.00</span>
                </div>
                <button class="btn btn-primary form-submit-btn" id="checkout-btn" style="margin-top: 1.5rem;" disabled>Proceed to Checkout</button>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initCartPage();
        });
    </script>
</body>
</html>
